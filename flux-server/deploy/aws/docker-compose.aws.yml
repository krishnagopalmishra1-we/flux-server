# AWS deployment compose file.
# bootstrap.sh copies this to flux-server/docker-compose.yml on the EC2 instance.
# All models live on the persistent EBS data disk mounted at /mnt/model-disk.
# CUDA_VISIBLE_DEVICES=0 restricts to one A100 on p4d.24xlarge (8x A100).

services:
  flux-server:
    build: .
    user: "0:0"
    ports:
      - "8080:8080"
    volumes:
      # EBS gp3 data disk (500 MB/s) replaces the GCP HDD — all model families live here
      - /mnt/model-disk/hf-cache:/mnt/hf-cache
      - /mnt/model-disk/model-cache-ssd:/app/model_cache
      - /mnt/model-disk/outputs:/mnt/outputs
      # LoRA adapters — bind-mount so uploads survive container rebuilds
      - ./loras:/app/loras
      - ./video_loras:/app/video_loras
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Use GPU 0 only — p4d.24xlarge has 8 A100s, we want exactly one
      - CUDA_VISIBLE_DEVICES=0
    env_file:
      - .env
    shm_size: '2g'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
