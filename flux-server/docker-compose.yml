services:
  flux-server:
    build: .
    user: "0:0"
    ports:
      - "8080:8080"
    volumes:
      - hf-cache:/mnt/hf-cache
      - ./loras:/app/loras
      - ./models:/app/models
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hf-cache:
