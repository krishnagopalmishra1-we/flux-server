services:
  flux-server:
    build: .
    user: "0:0"
    ports:
      - "8080:8080"
    volumes:
      # HDD — all video/music/animation models (WAN 14B=118G, I2V 14B=118G etc.)
      - /mnt/hf-cache-disk:/mnt/hf-cache
      # SSD (250GB total, 128GB free): FLUX 32G + HunyuanVideo ~20G + WAN 1.3B 27G = ~79G.
      # WAN 14B (118G each) stays on HDD — too large for SSD.
      - model_cache_ssd:/app/model_cache
      - outputs:/mnt/outputs
      # Legacy bind mounts kept for migration/inspection. Runtime LoRA paths
      # default to /mnt/hf-cache/loras and /mnt/hf-cache/video_loras.
      - ./loras:/app/loras
      - ./video_loras:/app/video_loras
    environment:
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      # Set HF_OFFLINE=true in .env after first successful model download
      # to eliminate HF network metadata round-trips on every load.
    env_file:
      - .env
    shm_size: '2g'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  outputs:
  # SSD-resident model cache — survives container rebuilds, stored on boot disk.
  model_cache_ssd:
