upstream gunicorn {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # SSE and long-running generation requests require extended timeouts
    proxy_read_timeout    3600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    3600s;

    # Disable buffering — required for SSE (text/event-stream) to stream in real time.
    # Without this, nginx buffers the entire response before forwarding to the client.
    proxy_buffering       off;
    proxy_cache           off;

    # Pass real client IP through to FastAPI (used for rate limiting + user hashing)
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Increase max upload size for LoRA files and source images
    client_max_body_size 512m;

    location / {
        proxy_pass http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";  # Enable HTTP/1.1 keepalive to upstream
    }

    # Explicit SSE endpoint — enforce no-buffer, no-cache headers
    location /api/jobs/ {
        proxy_pass http://gunicorn;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering  off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Accel-Buffering "no";
    }

    # Static files served directly by nginx (bypass gunicorn for better perf)
    location /static/ {
        proxy_pass http://gunicorn;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }
}
